name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dating-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dating-bot/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck and build
        run: npm run build
      - name: Prepare .env for Compose validation
        run: cp .env.example .env
      - name: Validate Compose file
        run: docker compose -f docker-compose.yml config
      - name: Validate JMeter profile in Compose
        run: docker compose -f docker-compose.yml --profile loadtest config
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Validate JMeter test plan (XML)
        run: xmllint --noout infra/jmeter/dating-bot-metrics.jmx

  validate-workers:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dating-bot/workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dating-bot/workers/requirements.txt
      - name: Install worker dependencies
        run: pip install -r requirements.txt
      - name: Syntax-check Celery tasks
        run: python -m compileall -q .
